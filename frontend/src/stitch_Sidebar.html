<!-- Micro-interaction Script -->
<script>
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', function(e) {
                // Clear existing active states
                document.querySelectorAll('nav a').forEach(l => {
                    l.classList.remove('text-primary', 'dark:text-primary', 'font-bold', 'border-l-2', 'border-primary', 'bg-surface-container-high');
                    l.classList.add('text-on-surface-variant', 'dark:text-on-surface-variant');
                    const icon = l.querySelector('.material-symbols-outlined');
                    if(icon) icon.style.fontVariationSettings = "'FILL' 0";
                });
                
                // Set current as active
                this.classList.remove('text-on-surface-variant', 'dark:text-on-surface-variant');
                this.classList.add('text-primary', 'dark:text-primary', 'font-bold', 'border-l-2', 'border-primary', 'bg-surface-container-high');
                const icon = this.querySelector('.material-symbols-outlined');
                if(icon) icon.style.fontVariationSettings = "'FILL' 1";
            });
        });
    </script>
