<body class="flex flex-col min-h-screen">
<!-- Top Branding Anchor -->
<header class="w-full h-12 flex items-center justify-between px-margin-md bg-surface border-b border-outline-variant">
<div class="font-label-sm text-label-sm tracking-widest text-primary uppercase">

<div class="flex items-center gap-margin-sm">
<span class="font-label-mono text-data-density text-on-surface-variant uppercase">v2.4.0_SECURE</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-margin-md relative overflow-hidden">
<!-- Subtle Industrial Background Element -->
<div class="absolute inset-0 z-0 opacity-10 pointer-events-none">
<div class="w-full h-full" style="background-image: linear-gradient(#262626 1px, transparent 1px), linear-gradient(90deg, #262626 1px, transparent 1px); background-size: 40px 40px;"></div>
</div>
<div class="w-full max-w-sm z-10">
<!-- Header Module -->
<div class="bg-surface-container-high border border-outline-variant mb-gutter">
<div class="bg-surface-container-highest px-margin-sm py-unit border-b border-outline-variant">
<h2 class="font-label-mono text-data-density text-primary uppercase">SYS_AUTH_PORTAL</h2>
</div>
<div class="p-margin-md">
<h1 class="font-display-lg text-display-lg text-primary mb-unit leading-none">LOGIN</h1>
<p class="font-label-mono text-label-mono text-on-surface-variant uppercase">ENTER OPERATOR CREDENTIALS</p>
</div>
</div>
<!-- Login Form Module -->
<div class="bg-surface-container border border-outline-variant p-margin-md">
<form class="space-y-margin-md" onsubmit="return false;">
<!-- Username Field -->
<div class="space-y-unit">
<label class="font-label-mono text-label-mono text-on-surface-variant uppercase block" for="username">USERNAME</label>
<div class="relative">
<input class="w-full bg-black border border-outline-variant text-primary font-label-mono text-body-md px-margin-sm py-margin-sm transition-colors duration-75" id="username" name="username" placeholder="UID_XXXXX" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-unit">
<label class="font-label-mono text-label-mono text-on-surface-variant uppercase block" for="password">PASSWORD</label>
<div class="relative">
<input class="w-full bg-black border border-outline-variant text-primary font-label-mono text-body-md px-margin-sm py-margin-sm transition-colors duration-75" id="password" name="password" placeholder="********" type="password"/>
</div>
</div>
<!-- Login Button -->
<div class="pt-margin-sm">
<button class="w-full bg-primary border border-primary text-black font-headline-md text-headline-md-mobile py-margin-sm hover:bg-black hover:text-white transition-all active:scale-[0.98]" type="submit">
                            EXECUTE_LOGIN
                        </button>
</div>
</form>
<div class="mt-margin-lg pt-margin-md border-t border-outline-variant flex flex-col gap-unit">

                </p>

</main>
<!-- Background Atmospheric Elements (Scripts only) -->
<script>
        // Micro-interaction for input fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                const label = input.parentElement.previousElementSibling;
                label.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                const label = input.parentElement.previousElementSibling;
                label.classList.remove('text-primary');
            });
        });

        // Simple button interaction feedback
        const btn = document.querySelector('button[type="submit"]');
        btn.addEventListener('click', function() {
            this.textContent = 'CONNECTING...';
            setTimeout(() => {
                this.textContent = 'EXECUTE_LOGIN';
            }, 1000);
        });
    </script>
